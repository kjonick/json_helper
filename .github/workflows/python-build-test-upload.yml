name: python-build-test-upload

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e .[build]

      - name: Build executable
        run: pyinstaller json_helper.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: dist/json_helper

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e .[build]

      - name: Run tests
        run: python -m pytest tests/ -v

  upload:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: build-output

      - name: Upload final artifact
        uses: actions/upload-artifact@v6
        with:
          name: json_helper
          path: build-output

